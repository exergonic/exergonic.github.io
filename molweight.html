<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Molecular Weight Calculator</title>
    <link rel="icon" type="image/svg+xml" href="/images/avatar.svg">
    <link rel="stylesheet" href="molweight.css" />
    <script src="molweight.js" defer></script>
  </head>
  <body>
    <a href="/" class="back-link">&larr; Home</a>
    <h1>Molecular Weight Calculator</h1>
    <p>Enter the molecular formula below.</p>
    <div id="input-text">
      <input
        type="text"
        id="mol-formula"
        name="mol-formula"
        placeholder="e.g. C6H12O6, Fe2(SO4)3"
        autofocus
      />
      <label for="mol-formula"></label>
    </div>
    <div class="result-card">
      <p id="output-text"></p>
    </div>
    <div id="details-text" class="details-text"></div>
  </body>
</html>
